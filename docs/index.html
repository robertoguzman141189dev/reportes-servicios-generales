<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Ejecutivo - En espera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 50%, #db2777 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            background: rgba(255,255,255,0.15);
            padding: 20px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .status h3 {
            margin-bottom: 10px;
        }
        code {
            background: rgba(0,0,0,0.2);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>📊 Reporte en Preparación</h1>
        <p>El sistema de reportes automáticos está configurado y listo.</p>
        <div class="status">
            <h3>⏳ Esperando primer archivo</h3>
            <p>Sube un archivo Excel a la carpeta de Google Drive configurada para generar el primer reporte.</p>
            <p style="margin-top: 15px; font-size: 0.9rem;">
                Carpeta: <code>Reportes-Servicios-Generales</code>
            </p>
        </div>
    </div>
</body>
</html>
